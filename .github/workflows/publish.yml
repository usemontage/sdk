name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to publish @montageai/sdk."
        required: true
        type: string

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - run: npm run build

      - run: npm publish --provenance --access public
